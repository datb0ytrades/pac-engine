# supabase/config.toml
# Configuración del proyecto Supabase para el PAC Engine

project_id = "pac-engine"

[api]
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
port = 54323

# Edge Functions
# Todas requieren JWT válido (Authorization: Bearer <token>)
# Secrets: supabase secrets set SUPABASE_URL=... SUPABASE_SERVICE_ROLE_KEY=...
# Para emit-document: SIGNING_SERVICE_URL, SIGNING_SERVICE_SECRET
# Para categorize-expense: ANTHROPIC_API_KEY
# Opcional: DGI_ENVIRONMENT (sandbox|production)

[functions.emit-document]
verify_jwt = true

[functions.get-document]
verify_jwt = true

[functions.cancel-document]
verify_jwt = true

[functions.generate-cafe-pdf]
verify_jwt = true

[functions.categorize-expense]
verify_jwt = true

[functions.scan-receipt]
verify_jwt = true

[functions.backfill-document-lines]
verify_jwt = true
